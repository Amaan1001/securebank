version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: securebank-db
    environment:
      POSTGRES_DB: securebank
      POSTGRES_USER: securebank
      POSTGRES_PASSWORD: securebank123
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securebank"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
