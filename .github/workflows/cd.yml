name: CD — Build Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all jars
        run: |
          ./gradlew :eureka-server:bootJar
          ./gradlew :account-service:bootJar
          ./gradlew :api-gateway:bootJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push eureka-server
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/securebank-eureka:latest

      - name: Build and push account-service
        uses: docker/build-push-action@v5
        with:
          context: ./account-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/securebank-account:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/securebank-gateway:latest