name: SecureBank CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Build and test account-service ──────────────────────────────────
  account-service:
    name: Account Service — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: securebank_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build and test
        run: ./gradlew :account-service:test :account-service:jacocoTestReport
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/securebank_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          EUREKA_CLIENT_ENABLED: false
          JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: account-service/build/reports/jacoco/

  # ── Job 2: Build all services ───────────────────────────────────────────────
  build-all:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: account-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build all jars
        run: |
          ./gradlew :eureka-server:bootJar
          ./gradlew :account-service:bootJar
          ./gradlew :api-gateway:bootJar

  # ── Job 3: Frontend lint and build ─────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build
        env:
          GATEWAY_URL: http://localhost:8080

  # ── Job 4: Docker build check ───────────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: build-all

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build jars for Docker
        run: |
          ./gradlew :eureka-server:bootJar
          ./gradlew :account-service:bootJar
          ./gradlew :api-gateway:bootJar

      - name: Build Docker images
        run: |
          docker build -t eureka-server:latest ./eureka-server
          docker build -t account-service:latest ./account-service
          docker build -t api-gateway:latest ./api-gateway