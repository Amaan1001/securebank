apiVersion: v1
kind: Secret
metadata:
  name: securebank-secrets
  namespace: securebank
type: Opaque
# Values are base64 encoded
# To encode: echo -n 'yourvalue' | base64
# securebank     -> c2VjdXJlYmFuaw==
# securebank123  -> c2VjdXJlYmFuazEyMw==
data:
  DB_USERNAME: c2VjdXJlYmFuaw==
  DB_PASSWORD: c2VjdXJlYmFuazEyMw==
